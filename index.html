<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模擬考成績查詢系統</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 950px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #1a73e8;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 380px;
      margin: 0 auto 30px auto;
    }
    input {
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      padding: 10px;
      font-size: 16px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #1557b0;
    }
    .student-info {
      text-align: center;
      font-size: 18px;
      margin-bottom: 20px;
      padding: 10px;
      background-color: #e8f0fe;
      border-radius: 5px;
      display: none;
    }
    .exam-section {
      margin-bottom: 30px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background-color: #fff;
    }
    .exam-title {
      background-color: #1a73e8;
      color: white;
      padding: 10px 15px;
      font-size: 18px;
      font-weight: bold;
    }
    .no-score {
      padding: 15px;
      color: #666;
      font-style: italic;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 6px;
      text-align: center;
      border-bottom: 1px solid #ddd;
      font-size: 15px;
    }
    th {
      background-color: #f8f9fa;
      font-weight: 600;
      white-space: nowrap;
    }
    .standards-wrapper {
      background-color: #f8f9fa;
      padding: 15px;
      border-top: 2px dashed #ddd;
    }
    .standards-title {
      font-size: 14px;
      color: #5f6368;
      margin-bottom: 10px;
      font-weight: bold;
      text-align: center;
    }
    .standards-table th {
      background-color: #e8eaed;
    }
    .standards-table td {
      border-bottom: 1px solid #eee;
    }
    #loading {
      text-align: center;
      display: none;
      color: #1a73e8;
      font-weight: bold;
      margin-top: 10px;
    }
    #error-msg {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>模擬考成績查詢系統</h1>
  
  <div class="login-form" id="loginForm">
    <input type="text" id="account" placeholder="帳號：孩子的班級與座號，例如高三戊1號就是3501" required>
    <input type="password" id="password" placeholder="密碼：孩子的生日，共四碼，如一月一日就是0101" required>
    <button onclick="fetchScores()">登入查詢</button>
    <div id="loading">資料查詢中，請稍候...</div>
    <div id="error-msg"></div>
  </div>

  <div class="student-info" id="studentInfo"></div>

  <div id="resultsContainer"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyb2vSwJRJMJelCbrxdgRH_CJpCRboBUb_mLDjHrTeVZi0cOe9tgFffSbqexlXrVNZchQ/exec"; 

  function fetchScores() {
    const acc = document.getElementById('account').value;
    const pwd = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    const loading = document.getElementById('loading');
    const resultsContainer = document.getElementById('resultsContainer');
    const studentInfo = document.getElementById('studentInfo');

    if (!acc || !pwd) {
      errorMsg.textContent = "請完整輸入帳號與密碼";
      return;
    }

    errorMsg.textContent = "";
    studentInfo.style.display = "none";
    resultsContainer.innerHTML = "";
    loading.style.display = "block";

    const requestUrl = `${API_URL}?account=${encodeURIComponent(acc)}&password=${encodeURIComponent(pwd)}`;
    
    fetch(requestUrl)
      .then(response => response.json())
      .then(data => {
        loading.style.display = "none";
        
        if (data.status === "error") {
          errorMsg.textContent = data.message;
        } else if (data.status === "success") {
          studentInfo.innerHTML = `<strong>班級：</strong>${data.studentClass} &nbsp;&nbsp;&nbsp; <strong>座號：</strong>${data.id} &nbsp;&nbsp;&nbsp; <strong>姓名：</strong>${data.name}`;
          studentInfo.style.display = "block";
          
          data.scores.forEach(exam => {
            const section = document.createElement('div');
            section.className = 'exam-section';
            
            const title = document.createElement('div');
            title.className = 'exam-title';
            title.textContent = exam.examName;
            section.appendChild(title);
            
            if (!exam.score || exam.score.chinese === "") {
              const noScore = document.createElement('div');
              noScore.className = 'no-score';
              noScore.textContent = "目前尚未有成績紀錄";
              section.appendChild(noScore);
            } else {
              const table = document.createElement('table');
              table.innerHTML = `
                <tr>
                  <th>國文</th>
                  <th>英文</th>
                  <th>數A</th>
                  <th>數B</th>
                  <th>自然</th>
                  <th>社會</th>
                  <th>國英數A自</th>
                  <th>國英數A</th>
                  <th>英數A自</th>
                  <th>國英數A自總排名</th>
                  <th>參加人數</th>
                </tr>
                <tr>
                  <td>${exam.score.chinese === "" ? "-" : exam.score.chinese}</td>
                  <td>${exam.score.english === "" ? "-" : exam.score.english}</td>
                  <td>${exam.score.mathA === "" ? "-" : exam.score.mathA}</td>
                  <td>${exam.score.mathB === "" ? "-" : exam.score.mathB}</td>
                  <td>${exam.score.science === "" ? "-" : exam.score.science}</td>
                  <td>${exam.score.social === "" ? "-" : exam.score.social}</td>
                  <td><strong>${exam.score.combo1 === "" ? "-" : exam.score.combo1}</strong></td>
                  <td><strong>${exam.score.combo2 === "" ? "-" : exam.score.combo2}</strong></td>
                  <td><strong>${exam.score.combo3 === "" ? "-" : exam.score.combo3}</strong></td>
                  <td><strong>${exam.score.rank === "" ? "-" : exam.score.rank}</strong></td>
                  <td><strong>${exam.score.totalParticipants === "" ? "-" : exam.score.totalParticipants}</strong></td>
                </tr>
              `;
              section.appendChild(table);
            }

            if (exam.standards && exam.standards.length > 0) {
              const standardsWrapper = document.createElement('div');
              standardsWrapper.className = 'standards-wrapper';
              
              let standardsRows = '';
              exam.standards.forEach(std => {
                standardsRows += `
                  <tr>
                    <td><strong>${std.level}</strong></td>
                    <td>${std.chinese}</td>
                    <td>${std.english}</td>
                    <td>${std.mathA}</td>
                    <td>${std.mathB}</td>
                    <td>${std.science}</td>
                    <td>${std.social}</td>
                  </tr>
                `;
              });

              standardsWrapper.innerHTML = `
                <div class="standards-title">✨ 本次模擬考各科五標參考 ✨</div>
                <table class="standards-table">
                  <tr>
                    <th>標別</th>
                    <th>國文</th>
                    <th>英文</th>
                    <th>數A</th>
                    <th>數B</th>
                    <th>自然</th>
                    <th>社會</th>
                  </tr>
                  ${standardsRows}
                </table>
              `;
              section.appendChild(standardsWrapper);
            }

            resultsContainer.appendChild(section);
          });
          
          document.getElementById('loginForm').style.display = 'none';
        }
      })
      .catch(err => {
        loading.style.display = "none";
        errorMsg.textContent = "連線發生錯誤，請稍後再試或聯繫老師。";
        console.error(err);
      });
  }
</script>

</body>
</html>
