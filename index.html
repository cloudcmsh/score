<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>模擬考成績查詢系統</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      padding: 15px;
      color: #333;
    }
    .container {
      max-width: 950px; 
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      box-sizing: border-box;
    }
    h1 {
      text-align: center;
      color: #1a73e8;
      font-size: 24px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 380px;
      margin: 0 auto 30px auto;
    }
    input {
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      padding: 10px;
      font-size: 16px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #1557b0;
    }
    .student-info {
      text-align: center;
      font-size: 18px;
      margin-bottom: 20px;
      padding: 15px;
      background-color: #e8f0fe;
      border-radius: 5px;
      display: none;
    }
    #analysisBtn {
      background-color: #34a853; 
      margin-top: 15px;
      width: auto;
      padding: 8px 20px;
      font-weight: bold;
    }
    #analysisBtn:hover {
      background-color: #2b8c46;
    }

    .exam-section {
      margin-bottom: 30px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background-color: #fff;
    }
    .exam-title {
      background-color: #1a73e8;
      color: white;
      padding: 10px 15px;
      font-size: 18px;
      font-weight: bold;
    }
    .exam-details {
      background-color: #eef2f7;
      padding: 8px 15px;
      font-size: 15px;
      color: #444;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 30px;
    }
    .no-score {
      padding: 15px;
      color: #666;
      font-style: italic;
      text-align: center;
    }
    .table-responsive {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px; /* 因欄位變動稍微放寬 */
    }
    th, td {
      padding: 10px 6px;
      text-align: center;
      border-bottom: 1px solid #ddd;
      font-size: 15px;
      white-space: nowrap;
    }
    th {
      background-color: #f8f9fa;
      font-weight: 600;
    }
    .standards-wrapper {
      background-color: #f8f9fa;
      padding: 15px;
      border-top: 2px dashed #ddd;
    }
    .standards-title {
      font-size: 14px;
      color: #5f6368;
      margin-bottom: 10px;
      font-weight: bold;
      text-align: center;
    }
    .standards-table th {
      background-color: #e8eaed;
    }
    .standards-table td {
      border-bottom: 1px solid #eee;
    }
    #loading {
      text-align: center;
      display: none;
      color: #1a73e8;
      font-weight: bold;
      margin-top: 10px;
    }
    #error-msg {
      color: red;
      text-align: center;
      margin-top: 10px;
    }

    .modal {
      display: none; 
      position: fixed; 
      z-index: 1000; 
      left: 0;
      top: 0;
      width: 100%; 
      height: 100%; 
      overflow: auto; 
      background-color: rgba(0,0,0,0.6); 
    }
    .modal-content {
      background-color: #fefefe;
      margin: 5% auto; 
      padding: 20px;
      border-radius: 10px;
      width: 90%; 
      max-width: 800px;
      position: relative;
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover, .close:focus {
      color: #333;
      text-decoration: none;
    }
    .chart-container {
      position: relative;
      height: 250px;
      width: 100%;
      margin-bottom: 30px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .rank-chart-container {
       height: 300px; 
    }
    .modal-title {
      text-align: center;
      color: #1a73e8;
      margin-top: 0;
      margin-bottom: 20px;
    }

    @media screen and (max-width: 768px) {
      .container { padding: 15px; }
      h1 { font-size: 22px; }
      .student-info { font-size: 16px; }
      .exam-details { flex-direction: column; gap: 5px; font-size: 14px; }
      th, td { font-size: 14px; padding: 8px 4px; }
      .table-responsive::-webkit-scrollbar { height: 6px; }
      .table-responsive::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }
      .modal-content { margin: 10% auto; padding: 15px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>模擬考成績查詢系統</h1>
  
  <div class="login-form" id="loginForm">
    <input type="text" id="account" placeholder="帳號：孩子的座號，如1號就是3501、2號就是3502" required>
    <input type="password" id="password" placeholder="密碼：孩子的生日，共四碼，如一月一日就是0101" required>
    <button onclick="fetchScores()">登入查詢</button>
    <div id="loading">資料查詢中，請稍候...</div>
    <div id="error-msg"></div>
  </div>

  <div class="student-info" id="studentInfo">
    <div id="studentText"></div>
    <button id="analysisBtn" style="display:none;" onclick="openAnalysisModal()">📊 開啟歷次成績趨勢分析</button>
  </div>

  <div id="resultsContainer"></div>
</div>

<div id="analysisModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeAnalysisModal()">&times;</span>
    <h2 class="modal-title">各科成績變動趨勢圖</h2>
    
    <div class="chart-container"><canvas id="chartChinese"></canvas></div>
    <div class="chart-container"><canvas id="chartEnglish"></canvas></div>
    <div class="chart-container"><canvas id="chartMathA"></canvas></div>
    <div class="chart-container"><canvas id="chartMathB"></canvas></div>
    <div class="chart-container"><canvas id="chartScience"></canvas></div>
    <div class="chart-container"><canvas id="chartSocial"></canvas></div>
    <div class="chart-container rank-chart-container"><canvas id="chartSchoolRank"></canvas></div>

  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyb2vSwJRJMJelCbrxdgRH_CJpCRboBUb_mLDjHrTeVZi0cOe9tgFffSbqexlXrVNZchQ/exec"; 

  let globalScoresData = [];
  let chartInstances = {};

  const examNameMap = {
    "第一次模擬考": "T1",
    "第二次模擬考": "T2",
    "第三次模擬考": "T3",
    "第四次模擬考": "T4",
    "第五次模擬考": "T5"
  };

  function fetchScores() {
    const acc = document.getElementById('account').value;
    const pwd = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    const loading = document.getElementById('loading');
    const resultsContainer = document.getElementById('resultsContainer');
    const studentInfo = document.getElementById('studentInfo');
    const studentText = document.getElementById('studentText');
    const analysisBtn = document.getElementById('analysisBtn');

    if (!acc || !pwd) {
      errorMsg.textContent = "請完整輸入帳號與密碼";
      return;
    }

    errorMsg.textContent = "";
    studentInfo.style.display = "none";
    analysisBtn.style.display = "none";
    resultsContainer.innerHTML = "";
    loading.style.display = "block";

    const requestUrl = `${API_URL}?account=${encodeURIComponent(acc)}&password=${encodeURIComponent(pwd)}`;
    
    fetch(requestUrl)
      .then(response => response.json())
      .then(data => {
        loading.style.display = "none";
        
        if (data.status === "error") {
          errorMsg.textContent = data.message;
        } else if (data.status === "success") {
          
          globalScoresData = data.scores;

          const displayClass = data.className || "";
          studentText.innerHTML = `<strong>班級：</strong>${displayClass} &nbsp;&nbsp;&nbsp; <strong>座號：</strong>${data.id} &nbsp;&nbsp;&nbsp; <strong>姓名：</strong>${data.name}`;
          studentInfo.style.display = "block";
          analysisBtn.style.display = "inline-block"; 
          
          data.scores.forEach(exam => {
            const section = document.createElement('div');
            section.className = 'exam-section';
            
            const title = document.createElement('div');
            title.className = 'exam-title';
            title.textContent = exam.examName;
            section.appendChild(title);

            if (exam.examDate !== "" || exam.examParticipants !== "") {
              const details = document.createElement('div');
              details.className = 'exam-details';
              details.innerHTML = `
                <span>日期：${exam.examDate === "" ? "-" : exam.examDate}</span>
                <span>全體考生人數：${exam.examParticipants === "" ? "-" : exam.examParticipants}</span>
              `;
              section.appendChild(details);
            }
            
            const tableWrapper = document.createElement('div');
            tableWrapper.className = 'table-responsive';

            const subjectKeys = ['chinese', 'english', 'mathA', 'mathB', 'science', 'social'];
            const hasAnyScore = exam.score && subjectKeys.some(k => exam.score[k] != null && exam.score[k] !== "");

            if (!hasAnyScore) {
              const noScore = document.createElement('div');
              noScore.className = 'no-score';
              noScore.textContent = "目前尚未有成績紀錄";
              section.appendChild(noScore);
            } else {
              const table = document.createElement('table');
              // 依據截圖更新的表頭欄位
              table.innerHTML = `
                <tr>
                  <th>國文</th>
                  <th>英文</th>
                  <th>數A</th>
                  <th>數B</th>
                  <th>自然</th>
                  <th>社會</th>
                  <th>國英數A自</th>
                  <th>英數A自</th>
                  <th>國英數A自校排</th>
                  <th>國英數A自總排</th>
                  <th>英數A自總排</th>
                </tr>
                <tr>
                  <td>${exam.score.chinese === "" ? "-" : exam.score.chinese}</td>
                  <td>${exam.score.english === "" ? "-" : exam.score.english}</td>
                  <td>${exam.score.mathA === "" ? "-" : exam.score.mathA}</td>
                  <td>${exam.score.mathB === "" ? "-" : exam.score.mathB}</td>
                  <td>${exam.score.science === "" ? "-" : exam.score.science}</td>
                  <td>${exam.score.social === "" ? "-" : exam.score.social}</td>
                  <td><strong>${exam.score.combo1 === "" ? "-" : exam.score.combo1}</strong></td>
                  <td><strong>${exam.score.combo3 === "" ? "-" : exam.score.combo3}</strong></td>
                  <td><strong>${exam.score.schoolRank1 === "" ? "-" : exam.score.schoolRank1}</strong></td>
                  <td><strong>${exam.score.totalRank1 === "" ? "-" : exam.score.totalRank1}</strong></td>
                  <td><strong>${exam.score.totalRank3 === "" ? "-" : exam.score.totalRank3}</strong></td>
                </tr>
              `;
              tableWrapper.appendChild(table);
              section.appendChild(tableWrapper);
            }

            if (exam.standards && exam.standards.length > 0) {
              const standardsWrapper = document.createElement('div');
              standardsWrapper.className = 'standards-wrapper';
              
              let standardsRows = '';
              exam.standards.forEach(std => {
                standardsRows += `
                  <tr>
                    <td><strong>${std.level}</strong></td>
                    <td>${std.chinese}</td>
                    <td>${std.english}</td>
                    <td>${std.mathA}</td>
                    <td>${std.mathB}</td>
                    <td>${std.science}</td>
                    <td>${std.social}</td>
                  </tr>
                `;
              });

              standardsWrapper.innerHTML = `
                <div class="standards-title">✨ 本次模擬考各科五標參考 ✨</div>
                <div class="table-responsive">
                  <table class="standards-table">
                    <tr>
                      <th>標別</th>
                      <th>國文</th>
                      <th>英文</th>
                      <th>數A</th>
                      <th>數B</th>
                      <th>自然</th>
                      <th>社會</th>
                    </tr>
                    ${standardsRows}
                  </table>
                </div>
              `;
              section.appendChild(standardsWrapper);
            }

            resultsContainer.appendChild(section);
          });
          
          document.getElementById('loginForm').style.display = 'none';
        }
      })
      .catch(err => {
        loading.style.display = "none";
        errorMsg.textContent = "連線發生錯誤，請稍後再試或聯繫老師。";
        console.error(err);
      });
  }

  function openAnalysisModal() {
    document.getElementById('analysisModal').style.display = "block";
    
    renderScoreChart('chartChinese', 'chinese', '國文', '#e84393'); 
    renderScoreChart('chartEnglish', 'english', '英文', '#0984e3'); 
    renderScoreChart('chartMathA', 'mathA', '數A', '#d63031');      
    renderScoreChart('chartMathB', 'mathB', '數B', '#e17055');      
    renderScoreChart('chartScience', 'science', '自然', '#00b894'); 
    renderScoreChart('chartSocial', 'social', '社會', '#fdcb6e');   
    
    // 校排綁定到更新後的 schoolRank1
    renderRankChart('chartSchoolRank', 'schoolRank1', '國英數A自校排', '#6c5ce7'); 
  }

  function closeAnalysisModal() {
    document.getElementById('analysisModal').style.display = "none";
  }

  window.onclick = function(event) {
    const modal = document.getElementById('analysisModal');
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }

  function renderScoreChart(canvasId, subjectKey, subjectName, colorHex) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    
    if (chartInstances[canvasId]) {
      chartInstances[canvasId].destroy();
    }

    const labels = [];
    const dataPoints = [];

    globalScoresData.forEach(exam => {
      const shortName = examNameMap[exam.examName] || exam.examName;
      labels.push(shortName);
      
      let val = null; 
      if (exam.score && exam.score[subjectKey] != null && exam.score[subjectKey] !== "") {
        val = Number(exam.score[subjectKey]);
        if (isNaN(val)) val = null;
      }
      dataPoints.push(val);
    });

    chartInstances[canvasId] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: `${subjectName} 級分`,
          data: dataPoints,
          borderColor: colorHex,
          backgroundColor: colorHex,
          pointBackgroundColor: colorHex,
          pointRadius: 5,
          borderWidth: 2,
          tension: 0.1, 
          spanGaps: true 
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'top' }
        },
        scales: {
          y: {
            min: 0,
            max: 15, 
            ticks: { stepSize: 1 }
          }
        }
      }
    });
  }

  function renderRankChart(canvasId, rankKey, titleName, colorHex) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    
    if (chartInstances[canvasId]) {
      chartInstances[canvasId].destroy();
    }

    const labels = [];
    const dataPoints = [];

    globalScoresData.forEach(exam => {
      const shortName = examNameMap[exam.examName] || exam.examName;
      labels.push(shortName);

      let val = null; 
      if (exam.score && exam.score[rankKey] != null && exam.score[rankKey] !== "") {
        val = Number(exam.score[rankKey]);
        if (isNaN(val)) val = null;
      }
      dataPoints.push(val);
    });

    chartInstances[canvasId] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: titleName,
          data: dataPoints,
          borderColor: colorHex,
          backgroundColor: colorHex,
          pointBackgroundColor: colorHex,
          pointRadius: 5,
          borderWidth: 2,
          tension: 0.1, 
          spanGaps: true 
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'top' }
        },
        scales: {
          y: {
            reverse: true,
            suggestedMin: 1, 
            ticks: {
              stepSize: 10, 
              precision: 0
            }
          }
        }
      }
    });
  }
</script>

</body>
</html>
